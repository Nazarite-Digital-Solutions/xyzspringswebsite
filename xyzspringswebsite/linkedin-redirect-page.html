<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>LinkedIn Redirect Page | XYZ Springs</title>
  
    <link rel="icon" type="image/svg+xml" href="xyz-springs-favicon.svg">
  
    <style>
      *, 
      *::before, 
      *::after { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }

      html, 
      body {
        height: 100%;
        overflow-x: hidden;
      }

      .linkedin-redirect-page {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 5vw;
        background-color: #111;
      }

      /* ---------- BOX ---------- */
      
      .linkedin-redirect-page-card {
        width: 90%;
        max-width: 495px;
        background: black;
        border: 3px solid red;
        border-radius: 25px;
        padding: 3rem 2.8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      /* ---------- SENTENCE ---------- */
      
      .linkedin-redirect-page-card-text {
        font-family: Arial, sans-serif;
        font-size: clamp(1rem, 2vw, 1.4rem);
        color: white;
        text-align: center;
        line-height: 1.6;
      }

      /* ---------- BUTTON ---------- */
      
      .linkedin-redirect-page-go-back-button {
        display: inline-block;
        padding: 0.75rem 2rem;
        min-height: 44px;
        border: 2px solid red;
        border-radius: 25px;
        background: white;
        color: black;
        font-family: Arial, sans-serif;
        font-size: clamp(0.88rem, 1.6vw, 1rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.25s ease, color 0.25s ease;
      }
      
      .linkedin-redirect-page-go-back-button:hover {
        background: red;
        color: white;
      }
      
/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

      @media (max-width: 1024px) {
        .linkedin-redirect-page-card { 
          padding: 2.5rem 2.2rem; 
        }
      }

      @media (max-width: 700px) {
        .linkedin-redirect-page-card {
          width: 94%;
          padding: 2.2rem 1.8rem;
          gap: 1.6rem;
        }
        
        .linkedin-redirect-page-card-text { 
          font-size: 1.2rem;
        }
        
        /* ---------- DISABLE HOVER EFFECTS ON TABLET ---------- */
      
        .linkedin-redirect-page-go-back-button:hover {
          background: white;
          color: black;
        }
      }

      @media (max-width: 468px) {
        .linkedin-redirect-page-card {
          width: 96%;
          padding: 2rem 1.4rem;
          border-radius: 18px;
          gap: 1.4rem;
        }

        .linkedin-redirect-page-card-text { 
          font-size: 1rem; 
        }

        .linkedin-redirect-page-go-back-button {
          width: 100%;
          text-align: center;
          font-size: 0.9rem;
          padding: 0.8rem 1.5rem;
        }
        
        /* ---------- DISABLE HOVER EFFECTS ON MOBILE ---------- */
        
        .linkedin-redirect-page-go-back-button:hover {
          background: white;
          color: black;
        }
      }
    </style>
  </head>
  
<!-- ──────────────────────────────────────────────────── BODY ───────────────────────────────────────────────────── -->
  
  <body>

    <main class="linkedin-redirect-page">
      <div class="linkedin-redirect-page-card">

        <p class="linkedin-redirect-page-card-text">On a live site, this would open LinkedIn</p>

        <a href="index.html" class="linkedin-redirect-page-go-back-button" rel="noopener noreferrer">GO BACK</a>

      </div>
    </main>
    
  </body>
</html>
